<style>
/* Studio of Anarchy — globals */
:root {
  --color-bg:         #0A0A0A;
  --color-surface:    #111111;
  --color-surface-2:  #1A1A1A;
  --color-border:     #2A2A2A;
  --color-accent:     #C9A96E;
  --color-accent-dim: #8A6E42;
  --color-text-primary:   #F0EDE8;
  --color-text-secondary: #9A9590;
  --color-text-dim:   #5A5550;

  --f-display: "Cormorant Garamond", "Times New Roman", serif;
  --f-ui: "Outfit", system-ui, sans-serif;
  --f-mono: "Space Mono", "Courier Prime", monospace;

  /* Strong easing curves — Emil Kowalski */
  --ease-out:    cubic-bezier(0.23, 1, 0.32, 1);
  --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
  --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--color-bg);
  color: var(--color-text-primary);
  font-family: var(--f-ui);
  font-weight: 300;
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body { cursor: none; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }
button { background: none; border: none; color: inherit; font-family: inherit; cursor: none; }

/* Custom cursor */
.cursor-dot, .cursor-ring {
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  will-change: transform;
}
.cursor-dot {
  width: 6px; height: 6px;
  background: var(--color-accent);
  border-radius: 50%;
}
.cursor-ring {
  width: 32px; height: 32px;
  border: 1px solid var(--color-text-secondary);
  border-radius: 50%;
  transition: width .35s cubic-bezier(.2,.8,.2,1),
              height .35s cubic-bezier(.2,.8,.2,1),
              background .3s,
              border-color .3s;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: transparent;
}
.cursor-ring.view {
  width: 84px; height: 84px;
  background: var(--color-accent);
  border-color: var(--color-accent);
  color: var(--color-bg);
}
.cursor-ring.link {
  width: 48px; height: 48px;
  border-color: var(--color-accent);
}
@media (pointer: coarse) {
  body { cursor: auto; }
  .cursor-dot, .cursor-ring { display: none; }
  button, a { cursor: pointer; }
}

.anarchy-caret {
  animation: anarchyBlink 0.7s steps(1) infinite;
}
@keyframes anarchyBlink {
  0%, 50% { opacity: 1; }
  50.01%, 100% { opacity: 0; }
}
.container { max-width: 1440px; margin: 0 auto; padding: 0 48px; }
@media (max-width: 900px) { .container { padding: 0 24px; } }
@media (max-width: 480px) { .container { padding: 0 20px; } }

/* Responsive grid helpers */
.editorial-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 32px;
}
@media (max-width: 900px) {
  .editorial-grid { grid-template-columns: 1fr; gap: 24px; }
  .editorial-grid > * { grid-column: 1 / -1 !important; grid-row: auto !important; }
}

/* Mobile nav overlay */
.mobile-menu-btn {
  display: none;
  width: 44px; height: 44px;
  align-items: center; justify-content: center;
  position: relative; z-index: 101;
}
.mobile-menu-btn span {
  position: absolute; left: 10px; right: 10px; height: 1px;
  background: var(--color-text-primary);
  transition: transform .4s cubic-bezier(.2,.8,.2,1), top .4s cubic-bezier(.2,.8,.2,1);
}
.mobile-menu-btn span:nth-child(1) { top: 18px; }
.mobile-menu-btn span:nth-child(2) { top: 26px; }
.mobile-menu-btn.open span:nth-child(1) { top: 22px; transform: rotate(45deg); }
.mobile-menu-btn.open span:nth-child(2) { top: 22px; transform: rotate(-45deg); }

@media (max-width: 900px) {
  .desktop-nav { display: none !important; }
  .mobile-menu-btn { display: flex !important; }
  .bottom-nav-wrap { display: none !important; }
}

.mobile-overlay {
  position: fixed; inset: 0;
  background: var(--color-bg);
  z-index: 99;
  display: flex; flex-direction: column;
  padding: 100px 28px 40px;
  clip-path: inset(0 0 100% 0);
}
.mobile-overlay a {
  font-family: var(--f-display);
  font-weight: 300;
  font-size: clamp(40px, 11vw, 72px);
  line-height: 1.05;
  padding: 14px 0;
  border-bottom: 1px solid var(--color-border);
  color: var(--color-text-primary);
  display: block;
}
.mobile-overlay a em { font-style: italic; color: var(--color-accent); }

.mono-label {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--color-text-dim);
}

.hairline {
  height: 1px;
  background: var(--color-border);
  width: 100%;
}

/* Display type */
.display {
  font-family: var(--f-display);
  font-weight: 300;
  line-height: 0.92;
  letter-spacing: -0.02em;
  color: var(--color-text-primary);
}
.display em { font-style: italic; font-weight: 300; color: var(--color-accent); }
.display em.anarchy-word { font-weight: 600; font-style: italic; color: var(--color-accent); }

/* Reveal helpers */
.line-mask {
  overflow: hidden;
  display: block;
  padding-bottom: 0.18em;
  margin-bottom: -0.18em;
}
.line-inner { display: block; will-change: transform; }

.clip-reveal {
  clip-path: inset(0 100% 0 0);
  will-change: clip-path;
}

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 16px;
  padding: 18px 28px;
  font-family: var(--f-ui);
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  border: 1px solid var(--color-border);
  color: var(--color-text-primary);
  background: transparent;
  transition: background 180ms var(--ease-out),
              color 180ms var(--ease-out),
              border-color 180ms var(--ease-out),
              transform 120ms var(--ease-out);
  border-radius: 999px;
}
.btn .arrow {
  width: 18px; height: 1px; background: currentColor; position: relative;
  transition: width 180ms var(--ease-out);
}
.btn .arrow::after {
  content: ""; position: absolute; right: 0; top: 50%;
  width: 6px; height: 1px; background: currentColor;
  transform: rotate(40deg); transform-origin: right center;
}
.btn .arrow::before {
  content: ""; position: absolute; right: 0; top: 50%;
  width: 6px; height: 1px; background: currentColor;
  transform: rotate(-40deg); transform-origin: right center;
}
.btn:active { transform: scale(0.97); }
@media (hover: hover) and (pointer: fine) {
  .btn:hover { background: var(--color-accent); color: var(--color-bg); border-color: var(--color-accent); }
  .btn:hover .arrow { width: 28px; }
  .btn.primary:hover { background: var(--color-text-primary); border-color: var(--color-text-primary); }
  .btn.ghost:hover { background: transparent; color: var(--color-accent); border-color: transparent; }
}
.btn.primary { background: var(--color-accent); color: var(--color-bg); border-color: var(--color-accent); }
.btn.ghost { border-color: transparent; padding-left: 0; padding-right: 0; }

/* App root hidden until mounted */
#root { min-height: 100vh; }

/* Mobile typography + layout overrides */
@media (max-width: 900px) {
  body { cursor: auto; }
  .cursor-dot, .cursor-ring { display: none !important; }
  button, a { cursor: pointer; }

    margin-top: 24px !important;
  }
  .hero-layout {

  }

  .hero-ctas {

    align-items: stretch !important;
  }

    width: 100%;
    justify-content: space-between;
    min-height: 52px;
  }

  .stat-grid-mobile {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    gap: 24px !important;
  }
  .stat-grid-mobile > * {
    grid-column: auto !important;
    grid-row: auto !important;
    border-left: none !important;
    padding-left: 0 !important;
    min-height: 0 !important;
  }

  .portfolio-grid-mobile {
    grid-template-columns: 1fr !important;
    gap: 20px !important;
  }
  .portfolio-grid-mobile > article {
    grid-column: 1 / -1 !important;
  }
  .portfolio-grid-mobile > article > div:first-child {
    aspect-ratio: 4 / 5 !important;
  }

  .svc-switcher {
    grid-template-columns: 1fr 1fr !important;
  }
  .svc-switcher > button {
    border-left: 1px solid var(--color-border) !important;
    border-top: 1px solid var(--color-border) !important;
  }
  .svc-switcher > button:nth-child(odd) { border-left: none !important; }
  .svc-switcher > button:nth-child(-n+2) { border-top: none !important; }

  .svc-detail {
    grid-template-columns: 1fr !important;
  }
  .svc-detail > * { grid-column: 1 / -1 !important; }

  .bespoke-row {
    grid-template-columns: 1fr !important;
  }
  .bespoke-row > * { grid-column: 1 / -1 !important; }

  .process-grid {
    grid-template-columns: 1fr !important;
    gap: 1px !important;
  }

  .contact-grid {
    grid-template-columns: 1fr !important;
  }
  .contact-grid > * { grid-column: 1 / -1 !important; }

  .btn { min-height: 48px; padding: 14px 22px; }
}

@media (max-width: 480px) {
  .hero-top-meta { display: none; }
  .hero-bottom-hint { display: none !important; }
}

@media (max-width: 900px) {
  .accordion-toggle { display: flex !important; }
  .pricing-list {
    max-height: 0; overflow: hidden;
    transition: max-height .4s cubic-bezier(.2,.8,.2,1);
  }
  .pricing-list.open { max-height: 600px; }
}

/* prefers-reduced-motion — keep opacity fades, remove positional motion */
@media (prefers-reduced-motion: reduce) {
  .btn, .cursor-ring, .mobile-menu-btn span,
  .mobile-overlay, .mobile-overlay a { transition-duration: 0ms !important; }
}

/* Selection */
::selection { background: var(--color-accent); color: var(--color-bg); }

/* Scrollbar */
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: var(--color-bg); }
::-webkit-scrollbar-thumb { background: var(--color-surface-2); }
::-webkit-scrollbar-thumb:hover { background: var(--color-border); }

<script type="text/babel">
// core.jsx — Cursor + Nav + helpers
const { useEffect, useRef, useState, useMemo, useLayoutEffect } = React;

function CustomCursor() {
  const dotRef = useRef(null);
  const ringRef = useRef(null);
  const [mode, setMode] = useState("");

  useEffect(() => {
    const dot = dotRef.current, ring = ringRef.current;
    const xSet = gsap.quickTo(dot, "x", { duration: 0.08, ease: "power3.out" });
    const ySet = gsap.quickTo(dot, "y", { duration: 0.08, ease: "power3.out" });
    const rxSet = gsap.quickTo(ring, "x", { duration: 0.32, ease: "power3.out" });
    const rySet = gsap.quickTo(ring, "y", { duration: 0.32, ease: "power3.out" });

    const onMove = (e) => {
      xSet(e.clientX); ySet(e.clientY);
      rxSet(e.clientX); rySet(e.clientY);
    };
    window.addEventListener("mousemove", onMove);

    const handleOver = (e) => {
      const t = e.target.closest("[data-cursor]");
      if (!t) { setMode(""); return; }
      setMode(t.getAttribute("data-cursor") || "");
    };
    window.addEventListener("mouseover", handleOver);

    return () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseover", handleOver);
    };
  }, []);

  return (
    <>
      <div ref={dotRef} className="cursor-dot" />
      <div ref={ringRef} className={`cursor-ring ${mode}`}>{mode === "view" ? "VIEW" : ""}</div>
    </>
  );
}

function SplitLines({ text, className = "", style = {}, reveal = true, delay = 0 }) {
  const lines = text.split("\n");
  const refs = useRef([]);
  useEffect(() => {
    if (!reveal) return;
    let cancelled = false;
    requestAnimationFrame(() => {
      if (cancelled) return;
      const els = refs.current.filter(Boolean);
      if (!els.length) return;
      gsap.fromTo(els,
        { yPercent: 110 },
        { yPercent: 0, duration: 1.1, ease: "expo.out", stagger: 0.08, delay, overwrite: "auto" }
      );
    });
    const safety = setTimeout(() => {
      const els = refs.current.filter(Boolean);
      els.forEach(el => { if (el) el.style.transform = "translateY(0%)"; });
    }, 2200 + delay * 1000);
    return () => { cancelled = true; clearTimeout(safety); };
  }, [reveal, delay, text]);
  return (
    <span className={className} style={style}>
      {lines.map((l, i) => (
        <span className="line-mask" key={i}>
          <span className="line-inner" ref={(el) => refs.current[i] = el}
                dangerouslySetInnerHTML={{ __html: l }} />
        </span>
      ))}
    </span>
  );
}

function BottomNav({ links, scrollTo }) {
  const [active, setActive] = useState("portfolio");
  const [visible, setVisible] = useState(false);
  const itemRefs = useRef({});
  const pillRef = useRef(null);
  const containerRef = useRef(null);
  const firstMove = useRef(true);

  useEffect(() => {
    const onScroll = () => {
      setVisible(window.scrollY > 200);
      const anchor = window.innerHeight * 0.35;
      let best = { id: links[0][1], dist: Infinity };
      links.forEach(([, id]) => {
        const el = document.getElementById(id);
        if (!el) return;
        const r = el.getBoundingClientRect();
        if (r.top <= anchor && r.bottom > anchor) {
          const d = Math.abs(r.top - anchor);
          if (d < best.dist) best = { id, dist: d };
        }
      });
      setActive(best.id);
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, [links]);

  useEffect(() => {
    const item = itemRefs.current[active];
    const container = containerRef.current;
    const pill = pillRef.current;
    if (!item || !container || !pill) return;
    const itemR = item.getBoundingClientRect();
    const contR = container.getBoundingClientRect();
    const x = itemR.left - contR.left;
    const w = itemR.width;
    if (firstMove.current) {
      gsap.set(pill, { x, width: w, opacity: 1 });
      firstMove.current = false;
    } else {
      gsap.to(pill, { x, width: w, duration: 0.7, ease: "expo.out" });
    }
  }, [active, visible]);

  return (
    <div className="bottom-nav-wrap" style={{
      position: "fixed", left: 0, right: 0, bottom: 24, zIndex: 98,
      display: "flex", justifyContent: "center",
      pointerEvents: "none",

    }}>
      <div ref={containerRef} style={{
        pointerEvents: "auto",
        position: "relative",
        display: "flex", gap: 4, alignItems: "center",
        padding: 6,
        background: "rgba(10,10,10,0.55)",
        backdropFilter: "blur(20px) saturate(160%)",
        WebkitBackdropFilter: "blur(20px) saturate(160%)",
        border: "1px solid rgba(240,237,232,0.14)",

        boxShadow: "0 20px 60px -20px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.06)",
        fontFamily: "var(--f-ui)", fontSize: 11, letterSpacing: "0.22em", textTransform: "uppercase",
      }}>
        <div ref={pillRef} aria-hidden style={{
          position: "absolute",
          top: 6, bottom: 6, left: 0,
          borderRadius: 999,
          background: "var(--color-accent)",
          opacity: 0,
          zIndex: 0,
          pointerEvents: "none",
          willChange: "transform, width",
        }} />
        {links.map(([l, id], i) => {
          const isActive = active === id;
          return (
            <a key={id} href={`#${id}`} onClick={scrollTo(id)} data-cursor="link"
               ref={(el) => itemRefs.current[id] = el}
               style={{

                 padding: "10px 18px",
                 borderRadius: 999,
                 color: isActive ? "var(--color-bg)" : "var(--color-text-secondary)",
                 transition: "color 180ms cubic-bezier(0.23,1,0.32,1)",
                 fontWeight: isActive ? 500 : 300,
                 display: "inline-flex", alignItems: "center", gap: 8,
               }}
               onMouseEnter={(e) => { if (!isActive) e.currentTarget.style.color = "var(--color-text-primary)"; }}
               onMouseLeave={(e) => { if (!isActive) e.currentTarget.style.color = "var(--color-text-secondary)"; }}>
              <span style={{
                fontFamily: "var(--f-mono)", fontSize: 9,
                color: isActive ? "var(--color-bg)" : "var(--color-text-dim)",

              }}>0{i + 1}</span>
              <span>{l}</span>
            </a>
          );
        })}
      </div>
    </div>
  );
}

function Navbar() {

      background: scrolled || menuOpen ? "rgba(10,10,10,0.72)" : "transparent",

    }}>
      <a href="#top" data-cursor="link" onClick={scrollTo("top")} style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{

          {i === 3 ? <em>{l}</em> : l}
        </a>
      ))}
      <div style={{ marginTop: "auto", display: "flex", flexDirection: "column", gap: 14, paddingTop: 32 }}>
        <a href="#" data-cursor="link" className="btn primary" style={{ justifyContent: "space-between", fontFamily: "var(--f-ui)", fontSize: 12, textTransform: "uppercase" }}>
          Hire on Fiverr <span className="arrow" />

  { family: "'Cormorant Garamond', serif", weight: 600, italic: true, style: { letterSpacing: "-0.02em" } },
  { family: "'Playfair Display', serif", weight: 900, italic: true, style: { letterSpacing: "-0.03em" } },
  { family: "'Bebas Neue', sans-serif", weight: 400, italic: false, style: { letterSpacing: "0.02em", textTransform: "uppercase" } },
  { family: "'Major Mono Display', monospace", weight: 400, italic: false, style: { letterSpacing: "-0.02em", textTransform: "lowercase" } },

function AnarchyTypewriter() {
  const WORD = "Anarchy";
  const [fontIdx, setFontIdx] = useState1(0);
  const [typed, setTyped] = useState1("");
  const [phase, setPhase] = useState1("typing");

  useEff1(() => {
    let timeout;
    if (phase === "typing") {
      if (typed.length < WORD.length) {
        timeout = setTimeout(() => setTyped(WORD.slice(0, typed.length + 1)), 110);
      } else {
        timeout = setTimeout(() => setPhase("hold"), 900);
      }
    } else if (phase === "hold") {
      timeout = setTimeout(() => setPhase("deleting"), 650);
    } else if (phase === "deleting") {
      if (typed.length > 0) {
        timeout = setTimeout(() => setTyped(typed.slice(0, -1)), 55);
      } else {
        timeout = setTimeout(() => {
          setFontIdx((fontIdx + 1) % ANARCHY_FONTS.length);
          setPhase("typing");
        }, 200);
      }
    }
    return () => clearTimeout(timeout);
  }, [phase, typed, fontIdx]);

  const f = ANARCHY_FONTS[fontIdx];

  return (
    <span style={{ display: "inline-flex", alignItems: "baseline" }}>
      <span style={{
        fontFamily: f.family,
        fontWeight: f.weight,
        fontStyle: f.italic ? "italic" : "normal",

        opacity: idx === i ? 1 : 0,
        scale: idx === i ? 1 : 1.04,

      });

    if (Math.abs(dx) > 50) {
      setI(v => dx < 0 ? (v + 1) % HERO_SLIDES.length : (v - 1 + HERO_SLIDES.length) % HERO_SLIDES.length);

            style={{

              background: idx === i ? "var(--color-accent)" : "rgba(240,237,232,0.4)",

              border: "none", padding: 0
            }} />
        ))}
      </div>
    </div>
  );
}

function Hero() {

function useReveal(sel, opts = {}) {
  useEff1(() => {
    const ctx = gsap.context(() => {
      gsap.utils.toArray(sel).forEach((el, i) => {

          y: 40, opacity: 0, duration: 1.1, ease: "expo.out",
          delay: (opts.stagger || 0) * i,
          scrollTrigger: { trigger: el, start: "top 88%", toggleActions: "play none none none" }
        });

    });
    return () => ctx.revert();
  }, []);
}

function Counter({ to, suffix = "", duration = 2 }) {
  const ref = useRef1(null);

    const ctx = gsap.context(() => {
      const obj = { v: 0 };
      gsap.to(obj, {
        v: to, duration, ease: "power2.out",
        scrollTrigger: { trigger: ref.current, start: "top 85%", once: true },
        onUpdate: () => { if (ref.current) ref.current.textContent = Math.round(obj.v) + suffix; }
      });
    }, ref);
    return () => ctx.revert();
  }, []);
  return <span ref={ref}>0{suffix}</span>;
}

function ClipImage({ src, alt, aspect = "16/9", style = {} }) {

<script type="text/babel">
// router-pages.jsx
const { useEffect: useEffR, useState: useStateR, useRef: useRefR, useMemo: useMemoR } = React;

function useRoute() {
  const parse = () => {
    const h = (window.location.hash || "#/").replace(/^#/, "");
    if (h === "/" || h === "") return { name: "home", anchor: null };
    if (h.startsWith("/gallery")) {
      const cat = h.split("/")[2] || "all";
      return { name: "gallery", category: cat };
    }
    if (h.startsWith("/project/")) {
      return { name: "project", slug: h.split("/")[2] };
    }
    if (h.startsWith("/#")) return { name: "home", anchor: h.slice(2) };
    if (h.startsWith("/portfolio") || h.startsWith("/services") || h.startsWith("/process") || h.startsWith("/contact")) {
      return { name: "home", anchor: h.replace(/^\//, "") };
    }
    return { name: "home", anchor: null };
  };

  const [route, setRoute] = useStateR(parse());
  useEffR(() => {
    const onHash = () => {
      setRoute(parse());
      window.scrollTo({ top: 0, behavior: "instant" });
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);
  return route;
}

function navigate(hash) {
  window.location.hash = hash;
}

function PageTransition({ routeKey, children }) {
  const ref = useRefR(null);
  useEffR(() => {
    if (!ref.current) return;
    gsap.fromTo(ref.current,
      { opacity: 0, y: 24 },
      { opacity: 1, y: 0, duration: 0.9, ease: "expo.out" }
    );
    setTimeout(() => ScrollTrigger && ScrollTrigger.refresh(), 200);
  }, [routeKey]);
  return <div ref={ref} key={routeKey}>{children}</div>;
}

        </div>

        {shown < filtered.length && (

          <span className="mono-label" style={{ color: "var(--color-bg)", opacity: 0.7 }}>— Ready for yours?</span>
          <h2 className="display" style={{ fontSize: "clamp(40px, 7vw, 88px)", fontWeight: 600, fontStyle: "italic", lineHeight: 1, marginTop: 16 }}>
            Start a project.
          </h2>
          <div style={{ display: "inline-flex", gap: 12, marginTop: 32, flexWrap: "wrap", justifyContent: "center" }}>
            <a href="#/contact" data-cursor="link" className="btn" style={{ background: "var(--color-bg)", color: "var(--color-text-primary)", borderColor: "var(--color-bg)" }}>
              Send a brief <span className="arrow" />
            </a>
            <a href="#" onClick={(e) => e.preventDefault()} data-cursor="link" className="btn" style={{ borderColor: "var(--color-bg)", color: "var(--color-bg)" }}>
              Hire on Fiverr <span className="arrow" />
            </a>
          </div>
        </div>
      </section>
    </main>
  );
}

window.__SOA_ROUTER = { useRoute, navigate, PageTransition, GalleryPage, ProjectPage };
</script>

<script type="text/babel">
gsap.registerPlugin(ScrollTrigger);

const { CustomCursor, Navbar, SplitLines } = window.__SOA_CORE;
const { Hero, Intro } = window.__SOA_HERO;
const { Portfolio, Services } = window.__SOA_PORTFOLIO;
const { Process, Contact, Footer } = window.__SOA_SECTIONS;
const { useRoute, PageTransition, GalleryPage, ProjectPage } = window.__SOA_ROUTER;

function App() {
  const [cfg, setCfg] = React.useState({ accent: "#C9A96E", bg: "#0A0A0A" });
  const route = useRoute();

  React.useEffect(() => {
    document.documentElement.style.setProperty("--color-accent", cfg.accent);
    document.documentElement.style.setProperty("--color-bg", cfg.bg);
  }, [cfg]);

  React.useEffect(() => {
    document.documentElement.style.scrollBehavior = "smooth";
    const onLoad = () => ScrollTrigger.refresh();
    window.addEventListener("load", onLoad);
    setTimeout(() => ScrollTrigger.refresh(), 800);
    return () => window.removeEventListener("load", onLoad);
  }, []);

  React.useEffect(() => {
    if (route.name === "home" && route.anchor) {
      setTimeout(() => {
        const el = document.getElementById(route.anchor);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 300);
    }
  }, [route]);

  return (
    <>
      <CustomCursor />
      <Navbar />
      <PageTransition routeKey={route.name}>
        {route.name === "gallery" && <GalleryPage category={route.category} />}
        {route.name === "project" && <ProjectPage slug={route.slug} />}
        {route.name === "home" && (
          <main>
            <Hero />
            <Intro />
            <Portfolio />
            <Services />
            <Process />
            <Contact />
          </main>
        )}
      </PageTransition>
      <Footer />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
